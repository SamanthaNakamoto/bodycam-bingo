<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bodycam Bingo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      color: #a78bfa;
      margin-bottom: 24px;
    }
    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 80px;
    }
    #join-screen h2 { font-size: 1.2rem; color: #c4b5fd; }
    #name-input {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: #1e1b4b;
      color: #fff;
      font-size: 1rem;
      width: 280px;
      text-align: center;
    }
    button {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-host    { background: #1e1b4b; color: #a78bfa; border: 2px solid #7c3aed; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-green   { background: #16a34a; color: #fff; }
    #player-screen { display: none; }
    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-width: 520px;
      margin: 16px auto;
    }
    .bingo-cell {
      background: #1e1b4b;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      font-size: 0.72rem;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      line-height: 1.3;
      word-break: break-word;
    }
    .bingo-cell:hover { border-color: #7c3aed; }
    .bingo-cell.marked { background: #7c3aed; color: #fff; border-color: #a78bfa; }
    .bingo-cell.free   { background: #4c1d95; color: #fbbf24; font-weight: bold; cursor: default; }
    #host-screen { display: none; }
    .host-controls {
      background: #1e1b4b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .host-controls select {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #0d0d1a;
      color: #e0e0ff;
      font-size: 0.95rem;
      flex: 1;
      min-width: 200px;
    }
    .called-phrases {
      background: #1e1b4b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .called-phrases h3 { margin-bottom: 10px; color: #a78bfa; }
    .phrase-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .phrase-chip {
      background: #4c1d95;
      color: #e0e0ff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    #all-player-cards h2 { margin-bottom: 14px; color: #a78bfa; }
    .player-cards-grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .player-card-wrapper {
      background: #1e1b4b;
      border-radius: 12px;
      padding: 14px;
      border: 2px solid #2e2b5b;
      min-width: 260px;
    }
    .player-card-wrapper.has-bingo {
      border-color: #fbbf24;
      box-shadow: 0 0 16px #fbbf2466;
    }
    .player-card-wrapper h4 { margin-bottom: 8px; font-size: 1rem; color: #c4b5fd; }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
    }
    .mini-cell {
      background: #0d0d1a;
      border-radius: 4px;
      padding: 3px 2px;
      font-size: 0.55rem;
      text-align: center;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      word-break: break-word;
    }
    .mini-cell.marked { background: #7c3aed; color: #fff; }
    .mini-cell.free   { background: #4c1d95; color: #fbbf24; }
    #bingo-alert {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fbbf24;
      color: #0d0d1a;
      font-size: 2.5rem;
      font-weight: bold;
      padding: 30px 50px;
      border-radius: 20px;
      z-index: 1000;
      text-align: center;
      animation: popIn 0.3s ease;
    }
    #host-bingo-alert {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      background: #fbbf24;
      color: #0d0d1a;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      z-index: 999;
    }
    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.5); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }
    .player-count { margin-left: auto; color: #6b7280; font-size: 0.9rem; }
    .or-divider   { color: #6b7280; font-size: 0.9rem; }
    #auto-call-btn.active { background: #dc2626; }
  </style>
</head>
<body>

<h1>🚔 Bodycam Bingo</h1>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <h2>Enter your name to get your card</h2>
  <input id="name-input" type="text" placeholder="Your name" maxlength="24"/>
  <button class="btn-primary" onclick="joinGame()">Join Game</button>
  <span class="or-divider">— or —</span>
  <button class="btn-host" onclick="goHostView()">🖥️ Host / Mod View</button>
</div>

<!-- PLAYER SCREEN -->
<div id="player-screen">
  <p id="player-greeting" style="text-align:center;color:#c4b5fd;margin-bottom:12px;"></p>
  <div id="bingo-card" class="bingo-grid"></div>
  <p style="text-align:center;color:#6b7280;font-size:0.8rem;margin-top:8px;">
    Only called phrases can be marked ✓
  </p>
</div>

<!-- HOST SCREEN -->
<div id="host-screen">
  <div class="host-controls">
    <select id="phrase-select">
      <option value="">— Select a phrase —</option>
    </select>
    <button class="btn-primary" onclick="callPhrase()">📣 Call Phrase</button>
    <button class="btn-green" id="auto-call-btn" onclick="toggleAutoCall()">▶ Auto Call</button>
    <button class="btn-danger" onclick="resetGame()">🔄 Reset Game</button>
    <span class="player-count" id="player-count">0 players connected</span>
  </div>
  <div class="called-phrases">
    <h3>Called Phrases</h3>
    <div class="phrase-chips" id="called-chips"></div>
  </div>
  <div id="all-player-cards">
    <h2>All Player Cards</h2>
    <div class="player-cards-grid" id="player-cards-grid"></div>
  </div>
</div>

<!-- ALERTS -->
<div id="bingo-alert">🎉 BINGO! 🎉<br/><span id="bingo-name"></span></div>
<div id="host-bingo-alert"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let myCard = [];
  let calledPhrases = [];
  let allPhrases = [];
  let autoCallInterval = null;
  let isHost = false;

  function joinGame() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { alert('Please enter your name!'); return; }
    isHost = false;
    socket.emit('joinGame', name);
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('player-screen').style.display = 'block';
    document.getElementById('player-greeting').textContent = 'Your card, ' + name + ' 🎱';
  }

  function goHostView() {
    isHost = true;
    socket.emit('requestHostData');
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('host-screen').style.display = 'block';
  }

  function callPhrase() {
    const sel = document.getElementById('phrase-select');
    const phrase = sel.value;
    if (!phrase) { alert('Select a phrase first!'); return; }
    socket.emit('callPhrase', phrase);
    sel.value = '';
  }

  function toggleAutoCall() {
    const btn = document.getElementById('auto-call-btn');
    if (autoCallInterval) {
      clearInterval(autoCallInterval);
      autoCallInterval = null;
      btn.textContent = '▶ Auto Call';
      btn.classList.remove('active');
    } else {
      btn.textContent = '⏹ Stop Auto';
      btn.classList.add('active');
      autoCallInterval = setInterval(function() {
        const remaining = allPhrases.filter(function(p) {
          return !calledPhrases.includes(p);
        });
        if (remaining.length === 0) {
          clearInterval(autoCallInterval);
          autoCallInterval = null;
          btn.textContent = '▶ Auto Call';
          btn.classList.remove('active');
          return;
        }
        const pick = remaining[Math.floor(Math.random() * remaining.length)];
        socket.emit('callPhrase', pick);
      }, 5000);
    }
  }

  function resetGame() {
    if (confirm('Reset the entire game? All cards will be cleared.')) {
      socket.emit('resetGame');
    }
  }

  socket.on('gameState', function(data) {
    calledPhrases = data.calledPhrases;
    allPhrases    = data.allPhrases;
  });

  socket.on('cardDealt', function(data) {
    myCard = data.card;
    calledPhrases = data.calledPhrases;
    renderPlayerCard();
  });

  socket.on('hostData', function(data) {
    calledPhrases = data.calledPhrases;
    allPhrases    = data.allPhrases;
    populatePhraseSelect();
    renderCalledChips();
    renderAllPlayerCards(data.players);
  });

  socket.on('phraseCalled', function(data) {
    calledPhrases = data.calledPhrases;
    if (!isHost) {
      updatePlayerCardMarks();
    } else {
      renderCalledChips();
      populatePhraseSelect();
    }
  });

  socket.on('playerUpdate', function(players) {
    const count = players.length;
    document.getElementById('player-count').textContent =
      count + ' player' + (count !== 1 ? 's' : '') + ' connected';
    if (isHost) renderAllPlayerCards(players);
  });

  socket.on('bingoAnnounce', function(data) {
    if (!isHost) {
      const alertBox = document.getElementById('bingo-alert');
      document.getElementById('bingo-name').textContent = data.name + ' got BINGO!';
      alertBox.style.display = 'block';
      setTimeout(function() { alertBox.style.display = 'none'; }, 4000);
    } else {
      const alertBox = document.getElementById('host-bingo-alert');
      alertBox.textContent = '🎉 ' + data.name + ' got BINGO!';
      alertBox.style.display = 'block';
      setTimeout(function() { alertBox.style.display = 'none'; }, 5000);
    }
  });

  socket.on('gameReset', function() {
    calledPhrases = [];
    myCard = [];
    document.getElementById('join-screen').style.display = 'flex';
    document.getElementById('player-screen').style.display = 'none';
    document.getElementById('host-screen').style.display = 'none';
    if (autoCallInterval) {
      clearInterval(autoCallInterval);
      autoCallInterval = null;
    }
  });

  function renderPlayerCard() {
    const grid = document.getElementById('bingo-card');
    grid.innerHTML = '';
    myCard.forEach(function(row) {
      row.forEach(function(cell) {
        const div = document.createElement('div');
        div.className = 'bingo-cell' +
          (cell.free ? ' free' : '') +
          (cell.marked ? ' marked' : '');
        div.textContent = cell.phrase;
        if (!cell.free) {
          div.onclick = function() {
            if (calledPhrases.includes(cell.phrase)) {
              cell.marked = !cell.marked;
              div.classList.toggle('marked', cell.marked);
            }
          };
        }
        grid.appendChild(div);
      });
    });
  }

  function updatePlayerCardMarks() {
    const cells = document.querySelectorAll('.bingo-cell:not(.free)');
    cells.forEach(function(cell) {
      if (calledPhrases.includes(cell.textContent)) {
        cell.classList.add('marked');
      }
    });
  }

  function populatePhraseSelect() {
    const sel = document.getElementById('phrase-select');
    sel.innerHTML = '<option value="">— Select a phrase —</option>';
    allPhrases.forEach(function(p) {
      if (!calledPhrases.includes(p)) {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      }
    });
  }

  function renderCalledChips() {
    const container = document.getElementById('called-chips');
    container.innerHTML = '';
    calledPhrases.forEach(function(p) {
      const chip = document.createElement('span');
      chip.className = 'phrase-chip';
      chip.textContent = p;
      container.appendChild(chip);
    });
  }

  function renderAllPlayerCards(players) {
    const grid = document.getElementById('player-cards-grid');
    grid.innerHTML = '';
    players.forEach(function(player) {
      const wrapper = document.createElement('div');
      wrapper.className = 'player-card-wrapper' + (player.hasBingo ? ' has-bingo' : '');
      const title = document.createElement('h4');
      title.textContent = player.hasBingo ? '🏆 ' + player.name : player.name;
      wrapper.appendChild(title);
      const miniGrid = document.createElement('div');
      miniGrid.className = 'mini-grid';
      player.card.forEach(function(row) {
        row.forEach(function(cell) {
          const c = document.createElement('div');
          c.className = 'mini-cell' +
            (cell.free ? ' free' : '') +
            (cell.marked ? ' marked' : '');
          c.textContent = cell.phrase;
          miniGrid.appendChild(c);
        });
      });
      wrapper.appendChild(miniGrid);
      grid.appendChild(wrapper);
    });
  }

  document.getElementById('name-input')
    .addEventListener('keydown', function(e) {
      if (e.key === 'Enter') joinGame();
    });
</script>
</body>
</html>
