<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%B9</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bodycam Bingo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      color: #a78bfa;
      margin-bottom: 24px;
    }
    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 80px;
    }
    #join-screen h2 { font-size: 1.2rem; color: #c4b5fd; }
    #name-input {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: #1e1b4b;
      color: #fff;
      font-size: 1rem;
      width: 280px;
      text-align: center;
    }
    button {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-host    { background: #1e1b4b; color: #a78bfa; border: 2px solid #7c3aed; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-green   { background: #16a34a; color: #fff; }
    #player-screen { display: none; }
    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-width: 520px;
      margin: 16px auto;
    }
    .bingo-cell {
      background: #1e1b4b;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      font-size: 0.72rem;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      line-height: 1.3;
      word-break: break-word;
    }
    .bingo-cell:hover { border-color: #7c3aed; }
    .bingo-cell.marked   { background: #7c3aed; color: #fff; border-color: #a78bfa; }
    .bingo-cell.free     { background: #4c1d95; color: #fbbf24; font-weight: bold; cursor: default; }
    .bingo-cell.callable { border-color: #fbbf24; }
    #host-screen { display: none; }
    .host-controls {
      background: #1e1b4b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .host-controls select {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #0d0d1a;
      color: #e0e0ff;
      font-size: 0.95rem;
      flex: 1;
      min-width: 200px;
    }
    .called-phrases {
      background: #1e1b4b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .called-phrases h3 { margin-bottom: 10px; color: #a78bfa; }
    .phrase-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .phrase-chip {
      background: #4c1d95;
      color: #e0e0ff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    #all-player-cards h2 { margin-bottom: 14px; color: #a78bfa; }
    .player-cards-grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .player-card-wrapper {
      background: #1e1b4b;
      border-radius: 12px;
      padding: 14px;
      border: 2px solid #2e2b5b;
      min-width: 260px;
    }
    .player-card-wrapper.has-bingo {
      border-color: #fbbf24;
      box-shadow: 0 0 16px #fbbf2466;
    }
    .player-card-wrapper h4 { margin-bottom: 8px; font-size: 1rem; color: #c4b5fd; }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
    }
    .mini-cell {
      background: #0d0d1a;
      border-radius: 4px;
      padding: 3px 2px;
      font-size: 0.55rem;
      text-align: center;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      word-break: break-word;
    }
    .mini-cell.marked { background: #7c3aed; color: #fff; }
    .mini-cell.free   { background: #4c1d95; color: #fbbf24; }
    #bingo-alert {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fbbf24;
      color: #0d0d1a;
      font-size: 2.5rem;
      font-weight: bold;
      padding: 30px 50px;
      border-radius: 20px;
      z-index: 1000;
      text-align: center;
      animation: popIn 0.3s ease;
    }
    
#bingo-alert .dismiss-btn {
  display: block;
  margin: 20px auto 0;
  background: #0d0d1a;
  color: #fbbf24;
  border: 2px solid #0d0d1a;
  padding: 10px 24px;
  font-size: 1rem;
  border-radius: 10px;
  cursor: pointer;
}
#bingo-alert .dismiss-btn:hover { opacity: 0.85; }

#host-bingo-alert {
  display: none;
  position: fixed;
  top: 20px;
  right: 20px;
  background: #fbbf24;
  color: #0d0d1a;
  padding: 14px 40px 14px 22px;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: bold;
  z-index: 999;
}
#host-bingo-alert .close-x {
  position: absolute;
  top: 6px;
  right: 10px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: bold;
  color: #0d0d1a;
}

    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.5); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }
    .player-count { margin-left: auto; color: #6b7280; font-size: 0.9rem; }
    .or-divider   { color: #6b7280; font-size: 0.9rem; }
    #auto-call-btn.active { background: #dc2626; }

    #phrase-flash {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 180px;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
}

#phrase-flash.active {
  animation: flashPulse 0.6s ease;
}

.reaction-bar {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 16px;
}

.reaction-btn {
  font-size: 32px;
  background: none;
  border: none;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.reaction-btn:hover {
  transform: scale(1.3);
}

.floating-reaction {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  animation: floatUp 2s ease forwards;
  z-index: 9998;
}

@keyframes floatUp {
  0%   { opacity: 1; bottom: 20px; }
  100% { opacity: 0; bottom: 120px; }
}

@keyframes flashPulse {
  0%   { opacity: 0; transform: scale(0.5); }
  40%  { opacity: 1; transform: scale(1.15); }
  100% { opacity: 0; transform: scale(1); }
}
  </style>
</head>
<body>

<h1>🚔 Bodycam Bingo</h1>
   <div id="phrase-flash">🚨</div>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <h2>Enter your name to get your card</h2>
  <input id="name-input" type="text" placeholder="Your name" maxlength="24"/>
  <button class="btn-primary" onclick="joinGame()">Join Game</button>
  <span class="or-divider" id="host-btn-divider">— or —</span>
  <button class="btn-host" id="host-btn" onclick="goHostView()">🖥️ Host / Mod View</button>
</div>

<!-- PLAYER SCREEN -->
 <div id="player-screen">
  <p id="player-greeting" style="text-align:center;color:#c4b5fd;margin-bottom:12px;"></p>
<p id="win-condition-banner" style="text-align:center;color:#fbbf24;font-weight:bold;margin-bottom:12px;"></p>
  <div id="bingo-card" class="bingo-grid"></div>
  <p style="text-align:center;color:#6b7280;font-size:0.8rem;margin-top:8px;">
    Only called phrases can be marked ✓
  </p>
  <div class="reaction-bar">
    <button class="reaction-btn" onclick="sendReaction('😤')">😤</button>
    <button class="reaction-btn" onclick="sendReaction('🍿')">🍿</button>
    <button class="reaction-btn" onclick="sendReaction('🙄')">🙄</button>
  </div>
</div>

<!-- HOST SCREEN -->
<div id="host-screen">
  <div class="host-controls">
    <select id="phrase-select">
      <option value="">— Select a phrase —</option>
    </select>
    <select id="win-condition-select" onchange="setWinCondition()">    
      <option value="singleLine">Single Line</option>
      <option value="xPattern">X Pattern</option>
      <option value="fourCorners">Four Corners</option>
      <option value="blackout">Blackout (Full Card)</option>
    </select>
    <button class="btn-primary" onclick="callPhrase()">📣 Call Phrase</button>
    <button class="btn-green" id="auto-call-btn" onclick="toggleAutoCall()">▶ Auto Call</button>
    <button class="btn-danger" onclick="resetGame()">🔄 Reset Game</button>
    <span class="player-count" id="player-count">0 players connected</span>
  </div>
  <div class="called-phrases">
    <h3>Called Phrases</h3>
    <div class="phrase-chips" id="called-chips"></div>
  </div>

  <div class="called-phrases" id="win-history-section">
  <h3>🏆 Hall of Fame</h3>
  <div id="win-history-list" style="display:flex; flex-direction:column; gap:8px;"></div>
</div>

  <div id="all-player-cards">
    <h2>All Player Cards</h2>
    <div class="player-cards-grid" id="player-cards-grid"></div>
  </div>
</div>

<!-- ALERTS -->
<div id="bingo-alert">
  🎉 BINGO! 🎉<br/>
  <span id="bingo-name"></span>
  <button class="dismiss-btn" onclick="dismissBingoAlert()">Dismiss</button>
</div>
<div id="host-bingo-alert">
  <span id="host-bingo-text"></span>
  <span class="close-x" onclick="dismissHostBingoAlert()">✕</span>
</div>


<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let myCard = [];
  let calledPhrases = [];
  let allPhrases = [];
  let autoCallInterval = null;
  let isHost = false;
  let playerId = null;
  let currentPlayerName = '';
  let currentWinCondition = 'singleLine'; 

const WIN_LABELS = {
  singleLine: 'Single Line',
  xPattern: 'X Pattern (Both Diagonals)',
  fourCorners: 'Four Corners',
  blackout: 'Blackout (Full Card)'
};

function updateWinConditionBanner() {
  const banner = document.getElementById('win-condition-banner');
  if (banner) banner.textContent = '🎯 Now playing for: ' + (WIN_LABELS[currentWinCondition] || 'Single Line');
}


  // ── HOST KEY CHECK ──────────────────────────────────────────
  const HOST_KEY = 'x93-lux-raven-andras-edwina-protocol-261k';
  const urlParams = new URLSearchParams(window.location.search);
  const hasHostKey = urlParams.get('host') === HOST_KEY;

  // Hide the Host/Mod button entirely for regular viewers
  if (!hasHostKey) {
    document.getElementById('host-btn').style.display = 'none';
    document.getElementById('host-btn-divider').style.display = 'none';
  }
  // ────────────────────────────────────────────────────────────

function joinGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { alert('Please enter your name!'); return; }
  isHost = false;
  currentPlayerName = name;

  // Generate or retrieve a persistent player ID
  playerId = localStorage.getItem('bingoPlayerId');
  if (!playerId) {
    playerId = crypto.randomUUID();
    localStorage.setItem('bingoPlayerId', playerId);
  }

  // Send both playerId and name when joining
  socket.emit('joinGame', { playerId, name: name });
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('player-screen').style.display = 'block';
document.getElementById('player-greeting').textContent = 'Your card, ' + name + ' 📹';
}

function sendReaction(emote) {
  socket.emit('playerReaction', { playerId, name: currentPlayerName, emote });
}

  function goHostView() {
    if (!hasHostKey) {
      alert('Access denied.');
      return;
    }
    isHost = true;
    socket.emit('requestHostData');
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('host-screen').style.display = 'block';
  }

  function callPhrase() {
    const sel = document.getElementById('phrase-select');
    const phrase = sel.value;
    if (!phrase) { alert('Select a phrase first!'); return; }
    socket.emit('callPhrase', phrase);
    sel.value = '';
  }

  function setWinCondition() {
  const sel = document.getElementById('win-condition-select');
  socket.emit('setWinCondition', sel.value);
}
  function toggleAutoCall() {
    const btn = document.getElementById('auto-call-btn');
    if (autoCallInterval) {
      clearInterval(autoCallInterval);
      autoCallInterval = null;
      btn.textContent = '▶ Auto Call';
      btn.classList.remove('active');
    } else {
      btn.textContent = '⏹ Stop Auto';
      btn.classList.add('active');
      autoCallInterval = setInterval(function() {
        const remaining = allPhrases.filter(function(p) {
          return !calledPhrases.includes(p);
        });
        if (remaining.length === 0) {
          clearInterval(autoCallInterval);
          autoCallInterval = null;
          btn.textContent = '▶ Auto Call';
          btn.classList.remove('active');
          return;
        }
        const pick = remaining[Math.floor(Math.random() * remaining.length)];
        socket.emit('callPhrase', pick);
      }, 5000);
    }
  }

  function resetGame() {
    if (confirm('Reset the entire game? All cards will be cleared.')) {
      socket.emit('resetGame');
    }
  }

 socket.on('gameState', function(data) {
  calledPhrases = data.calledPhrases;
  allPhrases    = data.allPhrases;
  currentWinCondition = data.currentWinCondition;
  updateWinConditionBanner();
});

  socket.on('cardDealt', function(data) {
    myCard = data.card;
    calledPhrases = data.calledPhrases;
    renderPlayerCard();
    updatePlayerCardMarks();  
  });

socket.on('youWereRemoved', () => {
  alert('You have been removed from the game by the host.');
  document.body.innerHTML = '<h2 style="text-align:center; margin-top:40px; color:#aaa;">You were removed from the game.</h2>';
});

  socket.on('hostData', function(data) {
  calledPhrases = data.calledPhrases;
  allPhrases    = data.allPhrases;
  populatePhraseSelect();
  renderCalledChips();
  renderAllPlayerCards(data.players);
  currentWinCondition = data.currentWinCondition;
  document.getElementById('win-condition-select').value = currentWinCondition;
  renderWinHistory(data.winHistory); 
});

socket.on('phraseCalled', function(data) {
  calledPhrases = data.calledPhrases;
  if (!isHost) {
    updatePlayerCardMarks();
  } else {
    renderCalledChips();
    populatePhraseSelect();
  }
  flashSiren();
});

socket.on('winHistoryUpdate', function(history) {
  renderWinHistory(history);
});

socket.on('winConditionChanged', function(condition) {
  currentWinCondition = condition;
  updateWinConditionBanner();
  if (isHost) {
    const sel = document.getElementById('win-condition-select');
    if (sel) sel.value = condition;
  }
});

function flashSiren() {
  const flash = document.getElementById('phrase-flash');
  flash.classList.remove('active');
  void flash.offsetWidth; // forces browser to restart the animation
  flash.classList.add('active');
}

  socket.on('playerUpdate', function(players) {
    const count = players.length;
    document.getElementById('player-count').textContent =
      count + ' player' + (count !== 1 ? 's' : '') + ' connected';
    if (isHost) renderAllPlayerCards(players);
  });

  socket.on('playerUpdate', (players) => {
  playerListEl.innerHTML = '';
  players.forEach(p => {
    const row = document.createElement('div');
    row.classList.add('player-row');

    const label = document.createElement('span');
    label.textContent = `${p.name} ${p.hasBingo ? '🏆' : ''}`;
    row.appendChild(label);

    const removeBtn = document.createElement('button');
    removeBtn.textContent = '❌ Remove';
    removeBtn.classList.add('remove-btn');
    removeBtn.addEventListener('click', () => {
      if (confirm(`Remove ${p.name} from the game?`)) {
        socket.emit('removePlayer', p.id);
      }
    });
    row.appendChild(removeBtn);

    playerListEl.appendChild(row);
  });
});

socket.on('bingoAnnounce', function(data) {
  const patternLabel = WIN_LABELS[data.pattern] || data.pattern;
  if (!isHost) {
    const alertBox = document.getElementById('bingo-alert');
    document.getElementById('bingo-name').textContent = data.name + ' got BINGO! (' + patternLabel + ')';
    alertBox.style.display = 'block';
  } else {
    const alertBox = document.getElementById('host-bingo-alert');
    document.getElementById('host-bingo-text').textContent = '🎉 ' + data.name + ' got BINGO! (' + patternLabel + ')';
    alertBox.style.display = 'block';
  }
});

  socket.on('reactionBroadcast', ({ name, emote }) => {
  showFloatingReaction(name, emote);
});

function showFloatingReaction(name, emote) {
  const el = document.createElement('div');
  el.className = 'floating-reaction';
  el.textContent = `${emote} ${name}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

  function dismissBingoAlert() {
    document.getElementById('bingo-alert').style.display = 'none';
  }

  function dismissHostBingoAlert() {
    document.getElementById('host-bingo-alert').style.display = 'none';
  }

socket.on('gameReset', function() {
  calledPhrases = [];
  myCard = [];
  document.getElementById('join-screen').style.display = 'flex';
  document.getElementById('player-screen').style.display = 'none';
  document.getElementById('host-screen').style.display = 'none';
  if (autoCallInterval) {
    clearInterval(autoCallInterval);
    autoCallInterval = null;
  }
  renderWinHistory([]); 
});

  function renderPlayerCard() {
    const grid = document.getElementById('bingo-card');
    grid.innerHTML = '';
    myCard.forEach(function(row) {
      row.forEach(function(cell) {
        const div = document.createElement('div');
        div.className = 'bingo-cell' +
          (cell.free ? ' free' : '') +
          (cell.marked ? ' marked' : '');
        div.textContent = cell.phrase;
        if (!cell.free) {
          div.onclick = function() {
    if (calledPhrases.includes(cell.phrase)) {
      cell.marked = !cell.marked;
      div.classList.toggle('marked', cell.marked);
      socket.emit('markCell', cell.phrase);
    }
  };

        }
        grid.appendChild(div);
      });
    });
  }

  // ── UPDATED: only highlight callable cells, don't auto-mark ──
  function updatePlayerCardMarks() {
    const cells = document.querySelectorAll('.bingo-cell:not(.free)');
    cells.forEach(function(cell) {
      if (calledPhrases.includes(cell.textContent)) {
        cell.classList.add('callable');
      }
    });
  }
  // ─────────────────────────────────────────────────────────────

  function populatePhraseSelect() {
    const sel = document.getElementById('phrase-select');
    sel.innerHTML = '<option value="">— Select a phrase —</option>';
    allPhrases.forEach(function(p) {
      if (!calledPhrases.includes(p)) {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      }
    });
  }

  function renderCalledChips() {
    const container = document.getElementById('called-chips');
    container.innerHTML = '';
    calledPhrases.forEach(function(p) {
      const chip = document.createElement('span');
      chip.className = 'phrase-chip';
      chip.textContent = p;
      container.appendChild(chip);
    });
  }

  function renderWinHistory(history) {
  const container = document.getElementById('win-history-list');
  if (!container) return; // player screens don't have this element — safe no-op

  container.innerHTML = '';

  if (!history || history.length === 0) {
    container.innerHTML = '<span style="color:#6b7280;font-size:0.85rem;">No wins yet this session.</span>';
    return;
  }

  history.forEach(function(entry, index) {
    const row = document.createElement('div');
    row.style.background = '#0d0d1a';
    row.style.borderRadius = '8px';
    row.style.padding = '8px 12px';
    row.style.fontSize = '0.9rem';
    row.style.display = 'flex';
    row.style.justifyContent = 'space-between';

    const label = WIN_LABELS[entry.pattern] || entry.pattern;
    const time = new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    row.innerHTML =
      '<span>🏆 <strong>' + entry.name + '</strong> — ' + label + '</span>' +
      '<span style="color:#6b7280;">' + time + '</span>';

    container.appendChild(row);
  });
}

  function renderAllPlayerCards(players) {
  const grid = document.getElementById('player-cards-grid');
  grid.innerHTML = '';
  players.forEach(function(player) {
    const wrapper = document.createElement('div');
    wrapper.className = 'player-card-wrapper' + (player.hasBingo ? ' has-bingo' : '');

    const title = document.createElement('h4');
    title.textContent = player.hasBingo ? '🏆 ' + player.name : player.name;
    wrapper.appendChild(title);

    // NEW: Remove button
    const removeBtn = document.createElement('button');
    removeBtn.textContent = '❌ Remove';
    removeBtn.className = 'remove-btn';
    removeBtn.addEventListener('click', function() {
      if (confirm('Remove ' + player.name + ' from the game?')) {
        socket.emit('removePlayer', player.id);
      }
    });
    wrapper.appendChild(removeBtn);

    const miniGrid = document.createElement('div');
    miniGrid.className = 'mini-grid';
    player.card.forEach(function(row) {
      row.forEach(function(cell) {
        const c = document.createElement('div');
        c.className = 'mini-cell' +
          (cell.free ? ' free' : '') +
          (cell.marked ? ' marked' : '');
        c.textContent = cell.phrase;
        miniGrid.appendChild(c);
      });
    });
    wrapper.appendChild(miniGrid);

    grid.appendChild(wrapper);
  });
}

  document.getElementById('name-input')
    .addEventListener('keydown', function(e) {
      if (e.key === 'Enter') joinGame();
    });
</script>
</body>
</html>
